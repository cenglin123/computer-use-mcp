# Example runtime configuration for the Computer Use MCP Server.
# Copy this file to ~/.computer-use/config.yaml and adjust the values.

log_dir: ~/.computer-use/logs
screenshot_dir: ~/.computer-use/screenshots
trace_dir: ~/.computer-use/traces
task_dir: ~/.computer-use/tasks

safety:
  # List of additional process names to treat as sensitive.
  sensitive_processes: []

  # List of additional window class names to treat as sensitive.
  sensitive_window_classes: []

  # If true, screenshot tool will attempt to detect sensitive windows and
  # warn/blank them. This is advisory in MVP; full protection requires user care.
  screenshot_sensitive_window_check: true

  # Whether to prepend built-in system commands (notepad, calc, explorer,
  # cmd, powershell, etc.) to the allowed list. Set to false for strict
  # security mode where only config.yaml entries + runtime grants apply.
  use_builtin_defaults: true

  # List of allowed command names or absolute paths for the launch_app tool.
  # Built-in defaults (see use_builtin_defaults above) are always allowed
  # unless use_builtin_defaults is false. Add custom paths below:
  allowed_commands:
    # Examples:
    # - C:/Program Files (x86)/HiBit Uninstaller/HiBitUninstaller.exe

display:
  # Default monitor for screenshot when no monitor argument is provided.
  # 1 = primary monitor (default). 0 = entire virtual desktop, 2+ = secondary.
  default_monitor: 1

image:
  # Settings for inline images (returned when include_image=true).
  # The on-disk saved screenshot is always full-resolution PNG.
  inline:
    # Maximum width in pixels. Wider screenshots are proportionally
    # resized. Set to 0 to disable resizing (keep original dimensions).
    # Default: 1600
    max_width: 1600

    # JPEG quality for inline images (1-100). Higher = better quality + larger.
    # UI screenshots are perfectly readable at 70-85.
    # Default: 75
    jpeg_quality: 75
